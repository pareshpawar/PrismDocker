name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Verify dependencies
        working-directory: prismdocker
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Vet
        working-directory: prismdocker
        run: go vet ./...

      - name: Build
        working-directory: prismdocker
        run: go build -o prism .

      - name: Test
        working-directory: prismdocker
        run: go test -v ./...
